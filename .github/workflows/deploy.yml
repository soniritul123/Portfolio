name: Publish to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site for GitHub Pages
        run: npm run build:pages

      - name: Add .nojekyll
        run: touch docs/.nojekyll

      - name: Commit and push docs folder
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: publish site to docs'
          file_pattern: docs/**
